name: Radar Andros

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min; RainViewer keeps 2 h, so delayed runs lose nothing
  workflow_dispatch: {}       # manual trigger button

permissions:
  contents: write

concurrency:
  group: radar-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Capture frames
        run: python capture.py

      - name: Commit and push
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no new frames"
          else
            git commit -m "chore: capture radar frames $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
