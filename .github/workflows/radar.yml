name: Radar Andros

# Coverage strategy: GitHub throttles scheduled workflows (observed cadence
# ~2-2.7 h despite a 30-min cron), and RainViewer only exposes a rolling 2 h
# window, so relying on cron timing loses frames. Instead, each job captures
# in a loop (every 10 min for ~5.5 h, committing as it goes). The cron only
# restarts the loop; the concurrency group queues the next run so it starts
# as soon as the previous loop ends.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Capture loop
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          end=$((SECONDS + 330*60))
          while [ $SECONDS -lt $end ]; do
            python capture.py || echo "capture cycle failed; retrying next cycle"
            git add data
            if git diff --cached --quiet; then
              echo "no new frames this cycle"
            else
              git commit -m "chore: capture radar frames $(date -u +%Y-%m-%dT%H:%MZ)"
              git pull --rebase origin ${GITHUB_REF_NAME} || true
              git push || echo "push failed; retrying with next commit"
            fi
            sleep 600
          done
