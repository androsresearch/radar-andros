name: Radar Andros

# Coverage strategy: GitHub throttles scheduled workflows and caps a job at
# 6 h, so the capture runs as a bounded loop (every 10 min for ~3 h) and the
# cron restarts it. cancel-in-progress replaces any older loop immediately,
# so there is always exactly one capturer alive and handover is instant.
# RainViewer keeps a rolling 2 h window, so an instant handover loses nothing.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar-capture
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Capture loop
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          end=$((SECONDS + 180*60))
          while [ $SECONDS -lt $end ]; do
            python capture.py || echo "capture cycle failed; retrying next cycle"
            git add data
            if git diff --cached --quiet; then
              echo "no new frames this cycle"
            else
              git commit -m "chore: capture radar frames $(date -u +%Y-%m-%dT%H:%MZ)"
              git pull --rebase origin ${GITHUB_REF_NAME} || true
              git push || echo "push failed; retrying with next commit"
            fi
            sleep 600
          done
