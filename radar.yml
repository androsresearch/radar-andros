name: Radar Andros

on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 min (RainViewer guarda 2h, hay margen)
  workflow_dispatch: {}       # boton para ejecutarlo a mano

permissions:
  contents: write

concurrency:
  group: radar-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias
        run: pip install requests pillow

      - name: Capturar frames
        run: python capture.py

      - name: Commit y push
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "sin frames nuevos"
          else
            git commit -m "radar andros $(date -u +%Y-%m-%d_%H:%MZ)"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
